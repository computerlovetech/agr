site_name: agr
site_url: https://computerlovetech.github.io/agr/
site_description: The package manager for AI agents. Built for teams practicing Agentic Engineering.
site_author: Kasper Junge
repo_url: https://github.com/computerlovetech/agr
repo_name: computerlovetech/agr
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    code: Roboto Mono

  logo: images/puzzle.png

  favicon: images/puzzle.png

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - navigation.tracking

    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  custom_dir: docs/overrides

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/computerlovetech/agr
      name: agr on GitHub
  generator: false
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: Thanks for the feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for the feedback! Help us improve by
            <a href="https://github.com/computerlovetech/agr/issues/new?title=Docs+feedback:+{title}&labels=docs" target="_blank">opening an issue</a>.

not_in_nav: |
  404.md
  includes/**

validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: info
  links:
    not_found: warn
    anchors: warn
    absolute_links: info
    unrecognized_links: info

plugins:
  - search:
      separator: '[\s\-\._]+'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      auto_append:
        - docs/includes/abbreviations.md
  - admonition
  - pymdownx.details
  - abbr
  - tables
  - def_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - meta
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Tutorial: tutorial.md
    - Core Concepts: concepts.md
  - Guides:
    - Supported Tools: tools.md
    - Skill Directory: skills.md
    - Ralph Directory: ralphs.md
    - Teams: teams.md
    - Configuration: configuration.md
    - "agrx — Try Without Installing": agrx.md
  - Building Resources:
    - Creating Skills: creating.md
    - Creating Ralphs: creating-ralphs.md
    - Python SDK: sdk.md
  - Contributing:
    - contributing/index.md
    - Architecture: contributing/architecture.md
  - Reference:
    - CLI Reference: reference.md
    - Troubleshooting: troubleshooting.md
    - What's New: changelog.md
